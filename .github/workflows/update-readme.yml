name: Update README GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # runs once daily at midnight UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_README_STATS_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate GitHub Stats via local server
        env:
          PAT_1: ${{ secrets.GH_README_STATS_TOKEN }}
        run: |
          # Clone and start github-readme-stats locally with our PAT
          git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/stats-server
          cd /tmp/stats-server
          npm install
          node express.js &
          sleep 5

          # Download SVGs from local server (PAT_1 env var gives access to private repos)
          curl -sf -o $GITHUB_WORKSPACE/stats.svg "http://localhost:9000/api?username=NatashaJWangui&theme=radical&include_all_commits=true&count_private=true"
          curl -sf -o $GITHUB_WORKSPACE/top-langs.svg "http://localhost:9000/api/top-langs?username=NatashaJWangui&layout=compact&theme=radical&count_private=true"

          # Streak stats from the public service (no private data needed)
          curl -sf -o $GITHUB_WORKSPACE/streak.svg "https://streak-stats.demolab.com/?user=NatashaJWangui&theme=radical"

      - name: Commit and Push Updates
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add stats.svg top-langs.svg streak.svg
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update GitHub stats images" && git push)