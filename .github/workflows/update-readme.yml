name: Update README GitHub Stats

on:
  schedule:
    - cron: '0 * * * *'  # runs every hour
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
            token: ${{ secrets.GH_README_STATS_TOKEN }}

      - name: Generate GitHub Stats Images
        run: |
          curl -o stats.png "https://github-readme-stats.vercel.app/api?username=NatashaJWangui&theme=radical&count_private=true&token=${{ secrets.GH_README_STATS_TOKEN }}"
          curl -o top-langs.png "https://github-readme-stats.vercel.app/api/top-langs/?username=NatashaJWangui&layout=compact&theme=radical&count_private=true&token=${{ secrets.GH_README_STATS_TOKEN }}"
          curl -o streak.png "https://github-readme-streak-stats.herokuapp.com/?user=NatashaJWangui&theme=radical"

      - name: Commit and Push Updates
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add stats.png top-langs.png streak.png
          git commit -m "Update GitHub stats images" || echo "No changes"
          git push https://x-access-token:${{ secrets.GH_README_STATS_TOKEN }}@github.com/NatashaJWangui/NatashaJWangui.git HEAD:master