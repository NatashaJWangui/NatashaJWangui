name: Update README GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # runs once daily at midnight UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_README_STATS_TOKEN }}

      - name: Generate GitHub Stats Images
        env:
          GH_TOKEN: ${{ secrets.GH_README_STATS_TOKEN }}
        run: |
          # Use GitHub GraphQL API to verify token works
          echo "Testing token..."
          curl -s -H "Authorization: bearer $GH_TOKEN" https://api.github.com/user | head -5

          # Download stats SVG - using the public Vercel API
          curl -f -o stats.svg "https://github-readme-stats.vercel.app/api?username=NatashaJWangui&theme=radical&include_all_commits=true&count_private=true"
          echo "Stats SVG downloaded: $(wc -c < stats.svg) bytes"

          # Download top languages SVG
          curl -f -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=NatashaJWangui&layout=compact&theme=radical&count_private=true"
          echo "Top langs SVG downloaded: $(wc -c < top-langs.svg) bytes"

          # Download streak stats SVG
          curl -f -o streak.svg "https://streak-stats.demolab.com/?user=NatashaJWangui&theme=radical"
          echo "Streak SVG downloaded: $(wc -c < streak.svg) bytes"

      - name: Commit and Push Updates
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add stats.svg top-langs.svg streak.svg
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update GitHub stats images" && git push)