name: Update GitHub Stats

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update README stats
        run: |
          # Replace YOUR_USERNAME with your GitHub username
          curl -o README.md "https://github-readme-stats.vercel.app/api?username=NatashaJWangui&theme=radical&count_private=true&token=${{ secrets.GH_README_STATS_TOKEN }}"